name: Build Windows Launcher

on:
  workflow_dispatch:
    inputs:
      anki_version:
        description: 'Anki version to build (e.g., 25.09)'
        required: true
        default: '25.09'
        type: string
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-windows.yml'
      - 'patches/**'
      - 'addons/**'
      - 'scripts/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/build-windows.yml'
      - 'patches/**'
      - 'addons/**'
      - 'scripts/**'

env:
  ANKI_VERSION: ${{ inputs.anki_version || '25.09' }}

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout AnkiBlur Repository
      uses: actions/checkout@v5

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Install Windows Dependencies
      run: |
        # Install NSIS for Windows installer creation
        choco install nsis -y

        # Verify NSIS installation
        Get-Command makensis -ErrorAction SilentlyContinue | Out-Null
        if ($?) {
            Write-Host "NSIS installed successfully"
            & makensis /VERSION
        } else {
            Write-Host "WARNING: makensis not found in PATH"
            # Check common installation paths
            if (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe") {
                Write-Host "Found NSIS at: C:\Program Files (x86)\NSIS\makensis.exe"
            }
        }

    - name: Download Anki Source
      run: |
        git clone --branch ${{ env.ANKI_VERSION }} --depth 1 https://github.com/ankitects/anki.git anki-source

    - name: Validate and Apply Patches
      shell: bash
      run: |
        chmod +x scripts/validate-and-apply-patches.sh
        ./scripts/validate-and-apply-patches.sh anki-source

    - name: Extract UV binaries
      working-directory: anki-source
      shell: powershell
      run: |
        # Download UV for Windows. Pinned to a known release: releases/latest
        # already broke this workflow once (uvw.exe layout drift), so don't
        # let future uv releases change the zip under us.
        $UV_VERSION = "0.11.29"
        New-Item -ItemType Directory -Force -Path out\extracted\uv
        Invoke-WebRequest -Uri "https://github.com/astral-sh/uv/releases/download/$UV_VERSION/uv-x86_64-pc-windows-msvc.zip" -OutFile "uv-windows.zip"
        # Extract directly into out\extracted\uv so BOTH uv.exe and uvw.exe
        # (both at the zip root) land where build_win.rs copy_files() expects them.
        # The previous version extracted to out\extracted and moved ONLY uv.exe,
        # leaving uvw.exe behind -> build_win.exe failed copying uv\uvw.exe.
        Expand-Archive -Path "uv-windows.zip" -DestinationPath "out\extracted\uv" -Force
        # Fail loudly here (clear message) instead of a cryptic os error 2 later
        if (-not (Test-Path "out\extracted\uv\uv.exe"))  { throw "uv.exe missing after extract" }
        if (-not (Test-Path "out\extracted\uv\uvw.exe")) { throw "uvw.exe missing after extract" }

    - name: Copy NSIS Plugins
      shell: bash
      working-directory: anki-source
      run: |
        echo "Setting up nsProcess NSIS plugin..."
        mkdir -p out/extracted/nsis_plugins

        # Copy nsProcess.dll from the repository
        # This DLL was extracted from the official Anki 25.09 Windows installer
        cp ../nsProcess.dll out/extracted/nsis_plugins/

        # Verify the file exists
        if [ -f "out/extracted/nsis_plugins/nsProcess.dll" ]; then
          echo "✓ nsProcess.dll is in place at: out/extracted/nsis_plugins/nsProcess.dll"
          ls -la out/extracted/nsis_plugins/
        else
          echo "✗ ERROR: nsProcess.dll not found at expected location"
          echo "Make sure nsProcess.dll exists in the repository root"
          exit 1
        fi

    - name: Patch Build Scripts (disable signing)
      shell: bash
      working-directory: anki-source
      run: |
        SRC="qt/launcher/src/bin/build_win.rs"
        # AnkiBlur ships UNSIGNED. Two reasons signing can never work here:
        #   1. We have no Ankitects code-signing certificate (the hardcoded
        #      /sha1 thumbprint in build_win.rs is theirs, not in our store).
        #   2. find_signtool() is hardcoded to the *arm64* signtool, which cannot
        #      execute on the x64 runner -> "os error 216".
        # So force sign_file() to always take its early-return skip path by
        # neutralizing the CODESIGN read. This is a code-level invariant
        # (AnkiBlur never signs), independent of any environment variable.
        sed -i 's|let codesign = env::var("CODESIGN").unwrap_or_default();|let codesign = String::new(); /* AnkiBlur: never sign */|' "$SRC"
        # Fail LOUDLY if the source drifted and the patch did not apply, instead
        # of silently falling through to a signing attempt (which is exactly how
        # the previous os-error-216 failures slipped past).
        if grep -q 'env::var("CODESIGN")' "$SRC"; then
          echo "ERROR: failed to neutralize code signing in $SRC (source changed?)"; exit 1
        fi
        echo "✓ Code signing neutralized:"
        grep -n "let codesign" "$SRC"
        # NSIS_PATH is intentionally left at its original hardcoded value,
        # C:\Program Files (x86)\NSIS\makensis.exe -- exactly where
        # 'choco install nsis' places makensis on the runner. (Previously this
        # step rewrote it to PATH-relative "makensis.exe", an unnecessary
        # dependency on PATH surviving bash -> cmd -> cargo -> build_win.)
        grep -n "NSIS_PATH" "$SRC"

    - name: Build Launcher
      shell: bash
      working-directory: anki-source
      run: |
        echo "Building Windows launcher..."

        # Signing is hard-disabled via the build_win.rs patch above. We still
        # export NOCOMP=1 so build.bat's own logic also sets CODESIGN=0
        # (belt-and-suspenders) and NO_COMPRESS=1 (skips LZMA -> faster NSIS build).
        # IMPORTANT: set it in the bash env and let cmd.exe INHERIT it. Do NOT use
        # an inline `set NOCOMP=1 && ...` inside cmd.exe -- cmd splits on `&&` and
        # captures the trailing space into the value ("1 " != "1"), which makes
        # build.bat take its else branch and silently re-enable signing.
        export NOCOMP=1

        # Add NSIS to PATH
        echo "Setting up NSIS in PATH..."
        export PATH="/c/Program Files (x86)/NSIS:$PATH"

        # Verify NSIS is accessible
        echo "Verifying NSIS installation..."
        if which makensis; then
          echo "makensis found in PATH"
          makensis //VERSION || echo "makensis version check failed"
        elif [ -f "/c/Program Files (x86)/NSIS/makensis.exe" ]; then
          echo "NSIS found at: /c/Program Files (x86)/NSIS/makensis.exe"
          /c/Program\ Files\ \(x86\)/NSIS/makensis.exe //VERSION || echo "Direct call failed"
        else
          echo "WARNING: makensis not found in expected locations"
          echo "Searching for makensis.exe..."
          find /c -name "makensis.exe" 2>/dev/null | head -5
        fi

        # CRITICAL: build_win.exe needs these files in specific locations
        # 1. Create .version file at repository root (where build_win.exe expects it)
        echo "Creating .version file at repository root..."
        echo "${{ env.ANKI_VERSION }}" > .version
        echo "Version file created with content: $(cat .version)"

        # 2. Verify nsProcess.dll exists
        if [ ! -f "out/extracted/nsis_plugins/nsProcess.dll" ]; then
          echo "Error: nsProcess.dll not found!"
          echo "Contents of out/extracted/nsis_plugins/:"
          ls -la out/extracted/nsis_plugins/ || echo "Directory does not exist"
          exit 1
        else
          echo "✓ Found nsProcess.dll"
        fi

        # 3. Verify anki.template.nsi exists
        if [ ! -f "qt/launcher/win/anki.template.nsi" ]; then
          echo "Error: anki.template.nsi not found!"
          echo "Contents of qt/launcher/win/:"
          ls -la qt/launcher/win/
          exit 1
        else
          echo "✓ Found anki.template.nsi"
        fi

        # 4. Check for other required files
        echo "Checking for required Windows files..."
        for file in "qt/launcher/win/anki-icon.ico" "qt/launcher/win/fileassoc.nsh" "qt/launcher/win/anki.exe.manifest" "qt/launcher/win/anki-manifest.rc"; do
          if [ -f "$file" ]; then
            echo "  ✓ Found: $file"
          else
            echo "  ✗ Missing: $file"
          fi
        done

        # Debug: Show current structure
        echo "Current directory: $(pwd)"
        echo "Build script location: qt/launcher/win/build.bat"

        # Run the Windows build script
        echo "Running build script..."
        # build_win.rs anchors ALL its relative paths (../../../.version, uv.exe,
        # pyproject.toml, out/extracted/...) to qt/launcher/win, so build.bat MUST
        # run with that as the working directory. build.bat is just
        # `cargo run --bin build_win` and does not cd itself, so we cd here.
        # (Previously build.bat ran from anki-source, making ../../../.version
        # resolve two levels too high -> "os error 2".)

        # Run the build and capture the exit code. build.bat reads %NOCOMP% from
        # the environment we exported above (inherited cleanly by cmd.exe, no
        # trailing space) -> CODESIGN=0, NO_COMPRESS=1. Signing is additionally
        # hard-disabled in build_win.rs, so it never runs regardless.
        if cmd.exe //c "cd qt\launcher\win && build.bat"; then
          echo "✓ Build completed successfully"

          # Verify the output exists
          echo "Checking build output..."
          if [ -f "out/launcher/anki-launcher-setup.exe" ]; then
            echo "✓ Found installer at: out/launcher/anki-launcher-setup.exe"
            ls -la out/launcher/anki-launcher-setup.exe
          elif [ -f "out/launcher/anki-launcher.exe" ]; then
            echo "✓ Found launcher at: out/launcher/anki-launcher.exe"
            ls -la out/launcher/anki-launcher.exe
          else
            echo "Warning: Could not find expected output files"
            echo "Contents of out/launcher:"
            ls -la out/launcher/ || echo "Directory does not exist"
          fi
        else
          echo "✗ Build failed with exit code: $?"
          echo "Checking for error logs..."
          if [ -d "out/launcher" ]; then
            echo "Contents of out/launcher:"
            ls -la out/launcher/
          fi
          exit 1
        fi

    - name: Package Artifacts
      shell: bash
      run: |
        mkdir -p artifacts
        chmod +x scripts/package-artifacts.sh
        ./scripts/package-artifacts.sh anki-source windows ${{ env.ANKI_VERSION }}

    - name: Generate Checksums
      shell: bash
      run: |
        cd artifacts
        # package-artifacts.sh writes the installer with the version in its name
        # (anki-launcher-<version>-windows.exe), so the checksum must match that.
        # sha256sum (Git-bash) instead of certUtil: its output is single-line and
        # `sha256sum -c` compatible, matching the Linux artifacts' checksum format.
        sha256sum "anki-launcher-${{ env.ANKI_VERSION }}-windows.exe" > "anki-launcher-${{ env.ANKI_VERSION }}-windows.exe.sha256"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v5
      with:
        name: ankiblur-launcher-windows
        path: artifacts/
        retention-days: 30