# Addon-era guard (successor of the 0B/0C runtime-patch validation): the
# AnkiBlur payload is a bundled add-on embedded in the launcher binary, so
# instead of dry-running site-packages diffs this workflow
#   1. rebuilds the .ankiaddon deterministically from addons/ and fails on
#      any drift against the committed zip (which legacy launchers still
#      download from the main branch at runtime),
#   2. uv-installs the REAL pinned aqt (with Qt wheels) and imports/runs the
#      add-on's entry points against it under QT_QPA_PLATFORM=offscreen --
#      a broken payload (syntax error, missing module in the zip, renamed
#      aqt symbol) fails the job loudly,
#   3. statically probes every aqt/anki symbol the add-on wraps
#      (scripts/probe-aqt-symbols.py), weekly also against the NEWEST aqt
#      release so upstream drift is caught the day it lands instead of by
#      the add-on's runtime tripwire on user machines.
name: Test addon against real aqt

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/test-runtime-patches.yml'
      - 'addons/**'
      - 'scripts/build-addon-zip.py'
      - 'scripts/probe-aqt-symbols.py'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/test-runtime-patches.yml'
      - 'addons/**'
      - 'scripts/build-addon-zip.py'
      - 'scripts/probe-aqt-symbols.py'
  schedule:
    - cron: '17 6 * * 1'   # weekly: catch upstream aqt drift

concurrency:
  group: test-runtime-patches-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in sync with the UV_VERSION pin in the build workflows.
  UV_VERSION: '0.11.29'
  # The aqt release the launcher installs for ANKI_VERSION 25.09.
  AQT_VERSION: '25.9.2'

jobs:
  # Pinned aqt: must always pass; gates releases (release.yml `needs` this).
  addon-pinned:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Build the .ankiaddon deterministically and check for drift
        run: |
          set -euo pipefail
          SRC=addons/anki_webview_addon/ankiblur_background_theme
          python3 scripts/build-addon-zip.py --source "$SRC" \
            --top-dir ankiblur_background_theme --output built1.ankiaddon
          python3 scripts/build-addon-zip.py --source "$SRC" \
            --top-dir ankiblur_background_theme --output built2.ankiaddon
          cmp built1.ankiaddon built2.ankiaddon \
            || { echo "::error::addon zip build is not deterministic"; exit 1; }
          # The committed zip is what legacy launchers download from main at
          # runtime AND what validate-and-apply-patches.sh cross-checks; any
          # drift against the source tree must fail here, not at build time.
          cmp built1.ankiaddon "$SRC.ankiaddon" \
            || { echo "::error::committed .ankiaddon is stale -- run scripts/build-addon-zip.py and commit the result"; exit 1; }

      - name: Install pinned uv
        run: |
          set -euo pipefail
          curl -LsSf "https://github.com/astral-sh/uv/releases/download/${UV_VERSION}/uv-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --strip-components=1
          ./uv --version

      - name: Create venv and install pinned aqt (real wheels, incl. Qt)
        run: |
          set -euo pipefail
          ./uv venv --python 3.13 .venv
          # Full install (aqt + anki + PyQt6/QtWebEngine wheels): the addon is
          # imported and executed against this, not just AST-scanned.
          ./uv pip install --python .venv/bin/python "aqt[qt6]==${AQT_VERSION}"
          ./uv pip list --python .venv/bin/python | grep -iE '^(aqt|anki|pyqt6) '

      - name: Install Qt runtime system libraries
        run: |
          set -euo pipefail
          sudo apt-get update
          # Shared libraries the PyQt6/QtWebEngine wheels dlopen even under
          # the offscreen platform plugin.
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libnss3 libxkbcommon0 libxcb-cursor0 \
            libxcomposite1 libxdamage1 libxrandr2 libxtst6 libasound2 \
            libfontconfig1 libdbus-1-3

      - name: Probe wrapped symbols in the installed aqt
        run: |
          set -euo pipefail
          .venv/bin/python scripts/probe-aqt-symbols.py \
            --site-packages .venv/lib/python3.13/site-packages

      - name: Run the addon entry points against real aqt (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          set -euo pipefail
          # Test the BUILT payload zip (what the launcher actually installs),
          # not the source tree: this also catches packaging bugs.
          mkdir -p addon_stage
          .venv/bin/python - <<'EOF'
          import zipfile
          with zipfile.ZipFile("built1.ankiaddon") as zf:
              zf.extractall("addon_stage")
          EOF
          test -f addon_stage/ankiblur_background_theme/__init__.py \
            || { echo "::error::built zip does not contain the addon package"; exit 1; }
          # Syntax gate for every shipped module, including __init__.py
          # (whose payload path only runs inside a full Anki process and
          # deliberately never raises).
          .venv/bin/python -m compileall -q addon_stage

          .venv/bin/python - <<'EOF'
          import importlib
          import sys

          sys.path.insert(0, "addon_stage")

          # QtWebEngineWidgets MUST be imported before the QApplication is
          # created (Qt enforces this), and WebEngine needs shared GL contexts.
          from PyQt6.QtCore import Qt
          from PyQt6.QtWidgets import QApplication
          QApplication.setAttribute(Qt.ApplicationAttribute.AA_ShareOpenGLContexts)
          import PyQt6.QtWebEngineWidgets  # noqa: F401
          app = QApplication(sys.argv)

          # Import every submodule directly (unlike the package __init__,
          # these do NOT swallow exceptions, so a renamed aqt symbol or a
          # broken import fails right here).
          mods = {
              name: importlib.import_module(f"ankiblur_background_theme.{name}")
              for name in ("tripwire", "webview_transparency",
                           "window_effects", "config_dialog")
          }

          # The entry points the launcher-era payload calls must exist.
          for mod_name, attr in [
              ("window_effects", "apply"),
              ("window_effects", "translucency_expected"),
              ("webview_transparency", "apply"),
              ("tripwire", "arm"),
              ("tripwire", "check"),
              ("tripwire", "report_fatal"),
              ("config_dialog", "ColorConfigDialog"),
          ]:
              assert callable(getattr(mods.get(mod_name), attr, None)), \
                  f"{mod_name}.{attr} missing or not callable"

          # Actually run the webview self-check against the REAL installed
          # aqt: apply() resolves AnkiWebViewKind members and wraps
          # AnkiWebView.__init__/on_theme_did_change/standard_css via
          # anki.hooks.wrap, recording per-op status. (mw is None outside a
          # full Anki process; apply() is written to tolerate that, so every
          # op below still exercises the real aqt classes.)
          ops = {}
          mods["webview_transparency"].apply(ops)
          bad = {op: st for op, st in ops.items() if st != "ok"}
          assert not bad, f"webview_transparency self-check failed: {bad}"
          print(f"webview_transparency ops all ok: {sorted(ops)}")

          # Pure helper from window_effects must run and answer.
          expected = mods["window_effects"].translucency_expected()
          assert isinstance(expected, bool), "translucency_expected() broken"
          print(f"translucency_expected() -> {expected}")
          print("addon entry-point checks passed against real aqt")
          EOF

  # Latest aqt: only on schedule/dispatch. Failure here is the desired loud
  # signal that upstream drifted, surfaced in CI instead of by the add-on's
  # tripwire on user machines. Deliberately a separate job so a new upstream
  # release can never block releasing the pinned version.
  # The github.workflow check skips this job when the file is invoked via
  # workflow_call (inside a callee that expression resolves to the CALLER's
  # workflow name), so a workflow_dispatch of release.yml is gated only on
  # addon-pinned.
  probe-latest:
    if: >-
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      && github.workflow == 'Test addon against real aqt'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5

      - name: Probe newest aqt release for the wrapped symbols
        id: probe
        run: |
          set +e
          python3 scripts/probe-aqt-symbols.py --latest 2>&1 | tee probe.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Open drift issue on failure
        if: failure() && steps.probe.outputs.exit_code != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TITLE="aqt symbol probe failed against the newest aqt release"
          # Don't stack duplicates: skip if an open probe issue already exists.
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "\"$TITLE\" in:title" --json number --jq 'length')
          if [ "$EXISTING" != "0" ]; then
            echo "An open probe-failure issue already exists; not creating another."
            exit 0
          fi
          {
            echo "The weekly aqt symbol probe failed: the newest aqt release on"
            echo "PyPI no longer provides one or more of the symbols the AnkiBlur"
            echo "add-on wraps. The add-on's runtime tripwire will warn users on"
            echo "that version; the add-on needs updating before bumping ANKI_VERSION."
            echo ""
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo ""
            echo '```'
            cat probe.log
            echo '```'
          } > issue_body.md
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "$TITLE" --body-file issue_body.md
