name: Probe aqt Symbols

# The AnkiBlur runtime payload is an add-on that wraps a small set of stable
# aqt APIs (anki.hooks.wrap / gui_hooks). scripts/probe-aqt-symbols.py
# statically asserts those symbols exist in a given aqt release:
#   - per-PR / push: against the pinned aqt release we build and ship against
#   - weekly cron:   against the newest aqt release on PyPI, opening an issue
#                    on failure so upstream drift is caught the day it lands
#                    instead of by the add-on's runtime tripwire on user machines.

on:
  schedule:
    # Weekly, Monday 06:23 UTC (off the top of the hour to dodge cron spikes)
    - cron: '23 6 * * 1'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/probe-aqt-symbols.yml'
      - 'scripts/probe-aqt-symbols.py'
      - 'addons/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/probe-aqt-symbols.yml'
      - 'scripts/probe-aqt-symbols.py'
      - 'addons/**'

env:
  # The aqt release the launcher installs for ANKI_VERSION 25.09
  PINNED_AQT_VERSION: '25.9.2'

jobs:
  probe-pinned:
    name: Probe pinned aqt (${{ github.event_name }})
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout AnkiBlur Repository
      uses: actions/checkout@v5

    - name: Probe pinned aqt release
      run: |
        python3 scripts/probe-aqt-symbols.py --version "$PINNED_AQT_VERSION"

  probe-latest:
    name: Probe newest aqt release
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
    - name: Checkout AnkiBlur Repository
      uses: actions/checkout@v5

    - name: Probe newest aqt release
      id: probe
      run: |
        set +e
        python3 scripts/probe-aqt-symbols.py --latest 2>&1 | tee probe.log
        code=${PIPESTATUS[0]}
        echo "exit_code=$code" >> "$GITHUB_OUTPUT"
        exit "$code"

    - name: Open drift issue on failure
      if: failure() && steps.probe.outputs.exit_code != ''
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        TITLE="aqt symbol probe failed against the newest aqt release"
        # Don't stack duplicates: skip if an open probe issue already exists.
        EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
          --search "\"$TITLE\" in:title" --json number --jq 'length')
        if [ "$EXISTING" != "0" ]; then
          echo "An open probe-failure issue already exists; not creating another."
          exit 0
        fi
        {
          echo "The weekly aqt symbol probe failed: the newest aqt release on"
          echo "PyPI no longer provides one or more of the symbols the AnkiBlur"
          echo "add-on wraps. The add-on's runtime tripwire will warn users on"
          echo "that version; the add-on needs updating before bumping ANKI_VERSION."
          echo ""
          echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          echo ""
          echo '```'
          cat probe.log
          echo '```'
        } > issue_body.md
        gh issue create --repo "$GITHUB_REPOSITORY" \
          --title "$TITLE" --body-file issue_body.md
