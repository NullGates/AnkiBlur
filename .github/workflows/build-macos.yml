name: Build macOS Launcher

on:
  workflow_dispatch:
    inputs:
      anki_version:
        description: 'Anki version to build (e.g., 25.09)'
        required: true
        default: '25.09'
        type: string
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-macos.yml'
      - 'patches/**'
      - 'scripts/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/build-macos.yml'
      - 'patches/**'
      - 'scripts/**'

env:
  ANKI_VERSION: ${{ inputs.anki_version || '25.09' }}

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout AnkiBlur Repository
      uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-darwin x86_64-apple-darwin

    - name: Install macOS Dependencies
      run: |
        brew install zstd

    - name: Free up disk space
      run: |
        set +e
        echo "=== disk before ==="; df -h /
        # GitHub macOS runners ship several Xcode versions + simulator runtimes
        # that consume most of the disk, leaving only a few GB free. Anki's
        # ./ninja bootstrap plus the dual-target Rust build then fills the rest,
        # so hdiutil fails with "No space left on device" when writing the DMG.
        # This build only needs the active Xcode's SDK (SDKROOT=/Applications/
        # Xcode.app/...), so remove the other Xcodes and the simulator runtimes;
        # that reclaims tens of GB. Resolution uses `cd && pwd -P` because macOS
        # `readlink -f` is unreliable, and it fails safe (removes nothing) if the
        # active Xcode can't be determined.
        real() { ( cd "$1" 2>/dev/null && pwd -P ); }
        KEEP1="$(real /Applications/Xcode.app)"
        KEEP2="$(real "$(xcode-select -p 2>/dev/null | sed 's#/Contents/Developer##')")"
        echo "keeping active Xcode(s): $KEEP1 $KEEP2"
        if [ -z "$KEEP1$KEEP2" ]; then
          echo "WARNING: could not resolve active Xcode; skipping Xcode removal"
        else
          for x in /Applications/Xcode_*.app; do
            [ -d "$x" ] || continue
            xr="$(real "$x")"
            if [ -n "$xr" ] && { [ "$xr" = "$KEEP1" ] || [ "$xr" = "$KEEP2" ]; }; then
              echo "keeping $x"; continue
            fi
            echo "removing $x"; sudo rm -rf "$x"
          done
        fi
        sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* 2>/dev/null
        sudo rm -rf ~/Library/Developer/CoreSimulator/Caches/* 2>/dev/null
        sudo rm -rf "$ANDROID_SDK_ROOT" "$ANDROID_HOME" 2>/dev/null
        echo "=== disk after ==="; df -h /
        true

    - name: Download Anki Source
      run: |
        git clone --branch ${{ env.ANKI_VERSION }} --depth 1 https://github.com/ankitects/anki.git anki-source

    - name: Setup macOS patches
      run: |
        # Copy macOS main.py patches to expected location
        mkdir -p patches/0B_anki_qt_window
        cp patches/0B_MACOS_anki_qt_window_main/anki_qt_window_lib_main.patch \
           patches/0B_anki_qt_window/
        cp patches/0B_MACOS_anki_qt_window_main/anki_qt_window_lib64_main.patch \
           patches/0B_anki_qt_window/
        # Copy shared webview patches
        cp patches/0C_anki_qt_window_webview/anki_qt_window_lib_webview.patch \
           patches/0B_anki_qt_window/
        cp patches/0C_anki_qt_window_webview/anki_qt_window_lib64_webview.patch \
           patches/0B_anki_qt_window/

    - name: Validate and Apply Patches
      shell: bash
      run: |
        chmod +x scripts/validate-and-apply-patches.sh
        ./scripts/validate-and-apply-patches.sh anki-source

    - name: Setup Build Environment
      shell: bash
      working-directory: anki-source
      run: |
        # Create version file
        echo "${{ env.ANKI_VERSION }}" > .version

        # Install UV for Python dependency management
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Extract UV binaries
      working-directory: anki-source
      run: |
        # Create universal UV binary for macOS
        mkdir -p out
        curl -L https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-apple-darwin.tar.gz -o uv-x86_64.tar.gz
        curl -L https://github.com/astral-sh/uv/releases/latest/download/uv-aarch64-apple-darwin.tar.gz -o uv-aarch64.tar.gz

        tar -xzf uv-x86_64.tar.gz
        tar -xzf uv-aarch64.tar.gz

        lipo -create uv-x86_64-apple-darwin/uv uv-aarch64-apple-darwin/uv -output out/uv

    - name: Patch macOS Build Script
      shell: bash
      working-directory: anki-source
      run: |
        # Replace the macOS build script to ensure proper paths
        cat > qt/launcher/mac/build.sh << 'EOF'
        #!/bin/bash
        set -e

        echo "Building macOS launcher..."

        # Define output path
        OUTPUT_DIR="../../../out/launcher"
        APP_LAUNCHER="$OUTPUT_DIR/Anki.app"

        # Build binaries for both architectures
        echo "Building launcher for both architectures..."
        rustup target add aarch64-apple-darwin x86_64-apple-darwin

        # Set explicit target directory
        export CARGO_TARGET_DIR="../../../target"

        cargo build -p launcher --release --target aarch64-apple-darwin
        cargo build -p launcher --release --target x86_64-apple-darwin

        # Build UV universal binary
        (cd ../../.. && ./ninja launcher:uv_universal)

        # Ensure output directory exists
        mkdir -p "$OUTPUT_DIR"

        # Remove existing app launcher
        rm -rf "$APP_LAUNCHER"

        # Create app launcher structure
        mkdir -p "$APP_LAUNCHER/Contents/MacOS" "$APP_LAUNCHER/Contents/Resources"

        # Create universal binary
        echo "Creating universal binary with lipo..."
        lipo -create \
            "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/launcher" \
            "$CARGO_TARGET_DIR/x86_64-apple-darwin/release/launcher" \
            -output "$APP_LAUNCHER/Contents/MacOS/launcher"

        # Copy UV
        cp "$OUTPUT_DIR/uv" "$APP_LAUNCHER/Contents/MacOS/"

        # Build install_name_tool stub
        clang -arch arm64 -o "$OUTPUT_DIR/stub_arm64" stub.c
        clang -arch x86_64 -o "$OUTPUT_DIR/stub_x86_64" stub.c
        lipo -create "$OUTPUT_DIR/stub_arm64" "$OUTPUT_DIR/stub_x86_64" -output "$APP_LAUNCHER/Contents/MacOS/install_name_tool"
        rm "$OUTPUT_DIR/stub_arm64" "$OUTPUT_DIR/stub_x86_64"

        # Copy support files
        ANKI_VERSION=$(cat ../../../.version | tr -d '\n')
        sed "s/ANKI_VERSION/$ANKI_VERSION/g" Info.plist > "$APP_LAUNCHER/Contents/Info.plist"
        cp icon/Assets.car "$APP_LAUNCHER/Contents/Resources/"
        cp ../pyproject.toml "$APP_LAUNCHER/Contents/Resources/"
        cp ../../../.python-version "$APP_LAUNCHER/Contents/Resources/"
        cp ../versions.py "$APP_LAUNCHER/Contents/Resources/"

        # Copy patches directory for runtime patching
        mkdir -p "$APP_LAUNCHER/Contents/Resources/patches"

        # Copy all anki_qt_window patches
        for patch in anki_qt_window_lib_main.patch anki_qt_window_lib_webview.patch \
                     anki_qt_window_lib64_main.patch anki_qt_window_lib64_webview.patch; do
            [ -f "../../../patches/0B_anki_qt_window/$patch" ] && \
                cp "../../../patches/0B_anki_qt_window/$patch" "$APP_LAUNCHER/Contents/Resources/patches/" || \
                echo "Warning: $patch not found"
        done

        # When anki_branding.patch is created:
        # [ -f "../../../patches/0A_anki_branding/anki_branding.patch" ] && \
        #     cp ../../../patches/0A_anki_branding/anki_branding.patch "$APP_LAUNCHER/Contents/Resources/patches/" || \
        #     echo "Warning: anki_branding.patch not found"

        # Skip codesigning if NODMG is set
        if [ -n "$NODMG" ]; then
            echo "Skipping codesigning and DMG creation (NODMG is set)"
        else
            # Codesign/bundle
            for i in "$APP_LAUNCHER/Contents/MacOS/uv" "$APP_LAUNCHER/Contents/MacOS/install_name_tool" "$APP_LAUNCHER/Contents/MacOS/launcher" "$APP_LAUNCHER"; do
                codesign --force -vvvv -o runtime -s "Developer ID Application:" \
                --entitlements entitlements.python.xml \
                "$i"
            done

            # Check
            codesign -vvv "$APP_LAUNCHER"
            spctl -a "$APP_LAUNCHER"

            # Notarize and build dmg
            ./notarize.sh "$OUTPUT_DIR"
            ./dmg/build.sh "$OUTPUT_DIR"
        fi

        echo "macOS build completed successfully!"
        EOF
        chmod +x qt/launcher/mac/build.sh

    - name: Import signing certificate
      if: github.event_name != 'pull_request'
      env:
        MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
      run: |
        set -euo pipefail
        CERT_PATH="$RUNNER_TEMP/cert.p12"
        KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

        # Decode the .p12 from the base64 secret
        echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"

        # Create + unlock a throwaway keychain for this job only
        security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

        # Import the Developer ID Application cert + private key
        security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

        # Make the temp keychain visible to codesign
        security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

        # Sanity check: the Developer ID identity must be present
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"
        rm -f "$CERT_PATH"

    - name: Build Launcher
      shell: bash
      working-directory: anki-source
      env:
        MACOSX_DEPLOYMENT_TARGET: '10.15'
        SDKROOT: '/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk'
        CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER: 'clang'
        CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: 'clang'
        NODMG: '1'  # Skip DMG creation in build script
      run: |
        echo "Building macOS launcher..."
        cd qt/launcher/mac
        ./build.sh

    - name: Free disk space before packaging
      working-directory: anki-source
      run: |
        # The launcher build (Rust compiled for BOTH apple-darwin targets, plus
        # the ./ninja bootstrap) fills the small macOS runner disk, so hdiutil
        # was failing with "No space left on device" when writing the DMG. The
        # universal binary and uv are already baked into Anki.app, so every one
        # of these build intermediates is safe to drop before packaging.
        echo "Disk before cleanup:"; df -h .
        rm -rf target || true
        # keep out/launcher (Anki.app); drop the other ninja/build outputs
        find out -mindepth 1 -maxdepth 1 ! -name launcher -exec rm -rf {} + 2>/dev/null || true
        rm -rf uv-*.tar.gz uv-x86_64-apple-darwin uv-aarch64-apple-darwin || true
        rm -rf "$HOME/.cargo/registry/cache" "$HOME/.cargo/registry/src" || true
        echo "Disk after cleanup:"; df -h .

    - name: Codesign app
      if: github.event_name != 'pull_request'
      working-directory: anki-source
      env:
        SIGN_ID: "Developer ID Application: VS NETWORK (X5L73KV432)"
      run: |
        set -euo pipefail
        APP="out/launcher/Anki.app"
        ENTITLEMENTS="qt/launcher/mac/entitlements.python.xml"

        # Hardened runtime + Python entitlements are required for notarization
        ls -l "$ENTITLEMENTS"

        # Sign nested binaries first, then the bundle itself
        for f in \
          "$APP/Contents/MacOS/uv" \
          "$APP/Contents/MacOS/install_name_tool" \
          "$APP/Contents/MacOS/launcher" \
          "$APP"; do
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            -s "$SIGN_ID" "$f"
        done

        # Verify before we bother notarizing
        codesign --verify --strict --verbose=2 "$APP"
        codesign -dvv "$APP" 2>&1 | grep -iE "Authority|flags" || true

    - name: Create DMG
      working-directory: anki-source
      run: |
        set -euo pipefail
        if [ ! -d "out/launcher/Anki.app" ]; then
          echo "Error: Anki.app not found at out/launcher/Anki.app"
          ls -la out/launcher/ || echo "out/launcher directory not found"
          exit 1
        fi

        # Reclaim every non-essential byte first: at DMG time only Anki.app
        # matters, and the runner disk is nearly full after the dual-target
        # build (hdiutil was failing with "No space left on device").
        rm -rf target "$HOME/.cargo/registry" "$HOME/.rustup" 2>/dev/null || true
        find out/launcher -mindepth 1 -maxdepth 1 ! -name Anki.app -exec rm -rf {} + 2>/dev/null || true
        echo "Disk before DMG:"; df -h .

        DMG_NAME="anki-launcher-mac.dmg"
        echo "Creating DMG: $DMG_NAME"

        # Stage with MOVE, not copy: copying briefly doubles the
        # hundreds-of-MB app on the tiny runner disk. mv is an instant rename
        # (same filesystem) and uses no extra space. The signed app is
        # preserved; we only need the DMG afterwards.
        mkdir -p dmg_stage
        mv out/launcher/Anki.app dmg_stage/

        hdiutil create -volname "AnkiBlur" -srcfolder dmg_stage -ov -format UDZO "out/launcher/$DMG_NAME"

        rm -rf dmg_stage
        echo "DMG created at out/launcher/$DMG_NAME"
        df -h .

    - name: Notarize and staple DMG
      if: github.event_name != 'pull_request'
      working-directory: anki-source
      env:
        AC_API_KEY: ${{ secrets.AC_API_KEY }}
        AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
        AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
      run: |
        set -euo pipefail
        DMG="out/launcher/anki-launcher-mac.dmg"
        KEY_PATH="$RUNNER_TEMP/AuthKey.p8"

        # Decode the App Store Connect API key
        echo "$AC_API_KEY" | base64 --decode > "$KEY_PATH"
        AUTH=(--key "$KEY_PATH" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID")

        # Submit WITHOUT --wait. `notarytool --wait` polls in one long-lived
        # request and dies on a single transient network error (NSURLError
        # -1009), which previously killed a 3h wait even though Apple had
        # accepted the submission. Submitting once + polling separately makes
        # each status check independent, so a dropped connection just retries.
        SUBMIT_ID=$(xcrun notarytool submit "$DMG" "${AUTH[@]}" --output-format json | jq -r .id)
        echo "Submission ID: $SUBMIT_ID"

        # Poll resiliently. The first notarization of a new app can be slow,
        # but subsequent ones are quick once Apple has profiled it. ~60 min cap.
        STATUS="Unknown"
        for i in $(seq 1 120); do
          STATUS=$(xcrun notarytool info "$SUBMIT_ID" "${AUTH[@]}" --output-format json 2>/dev/null | jq -r .status 2>/dev/null || echo "NetworkError")
          echo "[poll $i] status: $STATUS"
          case "$STATUS" in
            Accepted) break ;;
            Invalid|Rejected)
              echo "::error::Notarization $STATUS — full log follows:"
              xcrun notarytool log "$SUBMIT_ID" "${AUTH[@]}" || true
              exit 1 ;;
            *) sleep 30 ;;   # In Progress / NetworkError -> wait and retry
          esac
        done

        if [ "$STATUS" != "Accepted" ]; then
          echo "::error::Timed out after ~60 min (last status: $STATUS)."
          echo "Apple keeps processing $SUBMIT_ID server-side; just re-run this job to staple+ship."
          exit 1
        fi

        # Staple the ticket so the DMG validates even offline
        xcrun stapler staple "$DMG"
        xcrun stapler validate "$DMG"

        rm -f "$KEY_PATH"

    - name: Package Artifacts
      shell: bash
      run: |
        mkdir -p artifacts
        # Copy the DMG we created
        if [ -f "anki-source/out/launcher/anki-launcher-mac.dmg" ]; then
          cp anki-source/out/launcher/anki-launcher-mac.dmg artifacts/
          echo "DMG copied to artifacts"
        else
          echo "Error: DMG not found"
          echo "Contents of anki-source/out/launcher:"
          ls -la anki-source/out/launcher/ || echo "Directory not found"
          exit 1
        fi

    - name: Generate Checksums
      shell: bash
      run: |
        cd artifacts
        if [ -f "anki-launcher-mac.dmg" ]; then
          shasum -a 256 anki-launcher-mac.dmg > anki-launcher-mac.dmg.sha256
          echo "Checksum generated:"
          cat anki-launcher-mac.dmg.sha256
        else
          echo "Error: DMG not found in artifacts"
          ls -la
          exit 1
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ankiblur-launcher-macos
        path: artifacts/
        retention-days: 30